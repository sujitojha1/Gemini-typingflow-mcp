<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>TypingFlow — Settings</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0c0b; color: #ECEBDE;
            min-height: 100vh; padding: 40px 20px;
        }
        .container { max-width: 620px; margin: 0 auto; }
        .page-title { font-size: 22px; font-weight: 600; color: #4a8cd4; margin-bottom: 4px; }
        .page-subtitle { font-size: 13px; color: #6b6660; margin-bottom: 32px; }

        .section {
            background-color: #111010; border: 1px solid #1a1917;
            border-radius: 8px; padding: 24px; margin-bottom: 16px;
        }
        .section-title {
            font-size: 13px; font-weight: 600; color: #a19d96;
            letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px;
        }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; font-weight: 500; color: #a19d96; margin-bottom: 6px; }
        input[type="text"] {
            width: 100%; padding: 9px 12px;
            background: #0d0c0b; border: 1px solid #2a2926;
            color: #ECEBDE; border-radius: 5px; font-size: 13px;
            font-family: inherit; outline: none; transition: border-color 0.15s;
        }
        input[type="text"]:focus { border-color: #4a8cd4; }
        input::placeholder { color: #4a4640; }

        .note {
            font-size: 12px; color: #b8860b; background: rgba(184,134,11,0.08);
            border: 1px solid rgba(184,134,11,0.2); border-radius: 5px;
            padding: 10px 12px; margin-bottom: 16px; line-height: 1.5;
        }
        .note code {
            font-family: monospace; font-size: 11px;
            background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 3px;
        }

        .test-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
        #testStatus { font-size: 12px; }
        .status-ok  { color: #72BE47; }
        .status-err { color: #ff5555; }

        .save-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .btn-ghost {
            background: transparent; border: 1px solid #2a2926; color: #a19d96;
            padding: 9px 14px; border-radius: 5px; cursor: pointer;
            font-family: inherit; font-size: 13px; white-space: nowrap; transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: #4a8cd4; color: #4a8cd4; }
        .btn-primary {
            background: transparent; border: 1px solid #4a8cd4; color: #4a8cd4;
            padding: 10px 24px; border-radius: 5px; cursor: pointer;
            font-family: inherit; font-size: 14px; font-weight: 500; transition: all 0.15s;
        }
        .btn-primary:hover { background: #4a8cd4; color: #0d0c0b; }
        #saveStatus { font-size: 13px; color: #72BE47; height: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title">TypingFlow Settings</div>
    <div class="page-subtitle">Configure the backend server URL. The API key is stored securely in the backend only.</div>

    <!-- ── Backend server ── -->
    <div class="section">
        <div class="section-title">Backend Server</div>

        <div class="note">
            Start the backend before using the extension:<br>
            <code>cd backend &amp;&amp; uvicorn main:app --reload</code><br>
            The Google GenAI API key is configured in <code>backend/.env</code> — never in the browser.
        </div>

        <div class="field">
            <label for="backendUrl">Backend URL</label>
            <input type="text" id="backendUrl" placeholder="http://localhost:8000">
        </div>

        <div class="test-row">
            <button class="btn-ghost" id="testBtn">Test Connection</button>
            <div id="testStatus"></div>
        </div>
    </div>

    <!-- ── Save ── -->
    <div class="save-row">
        <button class="btn-primary" id="saveBtn">Save Settings</button>
        <div id="saveStatus"></div>
    </div>
</div>
<script src="options.js"></script>
</body>
</html>
