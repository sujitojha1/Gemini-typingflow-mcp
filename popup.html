<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        width: 320px; 
        background: radial-gradient(120% 120% at 50% -20%, #1e1b4b 0%, #030712 100%);
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        color: #f3f4f6; 
        padding: 24px; 
        border: 1px solid #1f2937; 
    }
    
    .header { text-align: center; margin-bottom: 24px; }
    .header-icon { 
        font-size: 36px; 
        margin-bottom: 8px; 
        background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        display: inline-block;
        filter: drop-shadow(0 4px 12px rgba(192, 132, 252, 0.4));
    }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #9ca3af; font-weight: 400; }
    
    .btn { 
        display: flex; align-items: center; justify-content: center; width: 100%; 
        background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); 
        color: #f3f4f6; padding: 14px; margin-bottom: 12px; cursor: pointer; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; 
        font-size: 14px; font-weight: 500; border-radius: 12px; 
        backdrop-filter: blur(8px); 
    }
    .btn:hover:not(:disabled) { 
        background: rgba(192, 132, 252, 0.1); 
        border-color: #c084fc; 
        transform: translateY(-1px); 
        box-shadow: 0 4px 16px rgba(192, 132, 252, 0.15); 
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .btn-primary { 
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
        border: none; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); 
    }
    .btn-primary:hover:not(:disabled) { 
        background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); 
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35); 
        border-color: transparent;
    }

    .tf-agent-bar {
        position: absolute; top: 0; left: 0; right: 0;
        display: none; align-items: center; gap: 10px; padding: 8px 16px;
        background: rgba(0,0,0,0.45); border-bottom: 1px solid rgba(255,255,255,0.03);
        font-size: 11px; font-family: 'Menlo', monospace; letter-spacing: 0.4px;
        color: #4b5563; min-height: 26px; z-index: 10;
    }
    .tf-agent-pip {
        width: 5px; height: 5px; border-radius: 50%; background: #1f2937; flex-shrink: 0; transition: background 0.4s;
    }
    .tf-agent-bar.tf-agent-active .tf-agent-pip { background: #4a8cd4; animation: pulse 1.5s infinite; }
    .tf-agent-bar.tf-agent-active { color: #888; display: flex; }
    .tf-agent-bar.tf-agent-done .tf-agent-pip { background: #27c93f; }
    .tf-agent-bar.tf-agent-done { color: #888; display: flex; }
    .tf-agent-bar.tf-agent-error .tf-agent-pip { background: #ff5555; animation: none; }
    .tf-agent-bar.tf-agent-error { color: #ff5555; display: flex; }
    .tf-agent-model-label { color: #4a8cd4; margin-left: 2px; }

    @keyframes pulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.4; } }

    .page-meta {
        display: flex; align-items: center; justify-content: center;
        gap: 8px; margin-bottom: 20px;
    }
    .page-stat-chip {
        font-size: 11px; color: #6b7280;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px; padding: 4px 10px; letter-spacing: 0.2px;
    }
    .page-stat-chip span { color: #e5e7eb; font-weight: 600; }
    .meta-divider { color: #1f2937; font-size: 16px; user-select: none; }
    .icon-btn {
        background: none; border: 1px solid rgba(255,255,255,0.08); color: #4b5563;
        width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: color 0.2s, border-color 0.2s, background 0.2s;
        font-size: 14px; padding: 0; flex-shrink: 0;
    }
    .icon-btn:hover { color: #9ca3af; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-btn.spinning { animation: spin 0.6s linear; }

  </style>
</head>
<body>
  <div class="tf-agent-bar" id="popup-agent-bar">
    <div class="tf-agent-pip"></div>
    <span id="popup-agent-task">agent · ready</span>
    <span class="tf-agent-model-label" id="popup-agent-model"></span>
  </div>

  <div class="header" style="margin-top: 24px;">
    <div class="header-icon">✦</div>
    <h1>Gemini TypingFlow - Agentic</h1>
    <p>AI-Powered Active Recall</p>
  </div>

  <div class="page-meta">
    <div class="page-stat-chip" id="stat-words"><span>—</span> words</div>
    <div class="page-stat-chip" id="stat-images"><span>—</span> images</div>
    <div class="meta-divider">|</div>
    <button id="btn-refresh" class="icon-btn" title="Refresh page">↻</button>
    <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
  </div>

  <button id="btn-extract" class="btn btn-primary">Process Page Intelligence</button>
  <button id="btn-type" class="btn" disabled>Launch Typing Session</button>

  <script src="popup.js"></script>
</body>
</html>
